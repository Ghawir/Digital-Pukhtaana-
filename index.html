<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Pukhtaana — FB & TikTok Monetization</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #050d1a;
  --navy2: #0a1628;
  --blue: #1877F2;
  --blue2: #0d5fd4;
  --gold: #c9a84c;
  --gold2: #e8c96a;
  --gold3: #f5e6b0;
  --white: #ffffff;
  --muted: #8a9ab5;
  --border: rgba(255,255,255,0.07);
  --green: #25D366;
  --tiktok: #ff0050;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background: var(--navy);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
}

/* ── DOLLAR CANVAS ── */
#dollar-bg {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; opacity: 0.04;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 48px;
  background: rgba(5,13,26,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: 'Syne', sans-serif;
  font-size: 1.2rem; font-weight: 800;
  letter-spacing: -0.5px;
}
.nav-logo span { color: var(--gold2); }
.nav-right { display: flex; align-items: center; gap: 10px; }
.nav-icon {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  border: 1px solid var(--border);
  color: var(--muted); text-decoration: none;
  transition: all 0.2s;
}
.nav-icon:hover { border-color: var(--gold); color: var(--gold2); }
.nav-wa {
  background: var(--green); color: white;
  font-size: 13px; font-weight: 600;
  padding: 9px 20px; border-radius: 50px;
  text-decoration: none; display: flex; align-items: center; gap: 7px;
  transition: all 0.2s;
}
.nav-wa:hover { background: #1da851; transform: scale(1.03); }

/* ── HERO ── */
.hero {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  padding: 120px 24px 80px;
  position: relative; overflow: hidden;
}
.hero-glow {
  position: absolute; inset: 0; z-index: 1;
  background:
    radial-gradient(ellipse 70% 60% at 50% 40%, rgba(24,119,242,0.18) 0%, transparent 65%),
    radial-gradient(ellipse 40% 30% at 80% 20%, rgba(201,168,76,0.12) 0%, transparent 50%),
    radial-gradient(ellipse 30% 30% at 20% 70%, rgba(24,119,242,0.08) 0%, transparent 50%);
}
.hero-grid {
  position: absolute; inset: 0; z-index: 1;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
}
.hero-content { position: relative; z-index: 2; max-width: 820px; }

.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  border: 1px solid rgba(201,168,76,0.35);
  background: rgba(201,168,76,0.08);
  color: var(--gold2); font-size: 11px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 8px 20px; border-radius: 50px; margin-bottom: 32px;
}
.badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold2); animation: blink 1.5s infinite; }

.hero h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(3rem, 9vw, 6.5rem);
  font-weight: 800; line-height: 0.95;
  letter-spacing: -2px;
  margin-bottom: 24px;
}
.hero h1 .line1 { color: white; display: block; }
.hero h1 .line2 {
  display: block;
  background: linear-gradient(90deg, var(--gold), var(--gold2), var(--gold3));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero h1 .line3 { color: rgba(255,255,255,0.5); display: block; font-size: 0.55em; letter-spacing: 0; font-weight: 700; margin-top: 8px; }

.hero-sub {
  font-size: 1.1rem; color: var(--muted);
  max-width: 500px; margin: 0 auto 40px;
  line-height: 1.7; font-weight: 300;
}

.platform-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; flex-wrap: wrap; }
.plat {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 20px; border-radius: 50px;
  font-size: 13px; font-weight: 600;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--muted);
  transition: all 0.3s;
}
.plat:hover { border-color: var(--blue); color: white; background: rgba(24,119,242,0.1); }

.hero-ctas { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.cta-primary {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--green); color: white;
  font-size: 0.95rem; font-weight: 600;
  padding: 15px 32px; border-radius: 50px;
  text-decoration: none; transition: all 0.3s;
  box-shadow: 0 8px 40px rgba(37,211,102,0.35);
}
.cta-primary:hover { transform: translateY(-2px); box-shadow: 0 16px 48px rgba(37,211,102,0.5); }
.cta-secondary {
  display: inline-flex; align-items: center; gap: 8px;
  border: 1px solid var(--border); color: var(--muted);
  font-size: 0.95rem; font-weight: 500;
  padding: 15px 28px; border-radius: 50px;
  text-decoration: none; transition: all 0.3s;
  background: rgba(255,255,255,0.03);
}
.cta-secondary:hover { border-color: rgba(255,255,255,0.2); color: white; }

/* ── TICKER ── */
.ticker-wrap {
  background: rgba(201,168,76,0.08);
  border-top: 1px solid rgba(201,168,76,0.15);
  border-bottom: 1px solid rgba(201,168,76,0.15);
  padding: 12px 0; overflow: hidden; position: relative; z-index: 2;
}
.ticker {
  display: flex; gap: 60px;
  animation: ticker 25s linear infinite;
  white-space: nowrap;
}
.ticker-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--gold);
  flex-shrink: 0;
}
@keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* ── STATS ── */
.stats-section {
  position: relative; z-index: 2;
  padding: 80px 24px;
}
.stats-grid {
  max-width: 1000px; margin: 0 auto;
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px; background: var(--border);
  border: 1px solid var(--border); border-radius: 20px; overflow: hidden;
}
.stat-box {
  background: var(--navy2);
  padding: 40px 24px; text-align: center;
  transition: background 0.3s;
}
.stat-box:hover { background: rgba(24,119,242,0.08); }
.stat-num {
  font-family: 'Syne', sans-serif;
  font-size: 2.8rem; font-weight: 800;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  line-height: 1; margin-bottom: 6px;
}
.stat-label { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: 0.5px; }

/* ── GROWTH GRAPHS ── */
.graphs-section {
  position: relative; z-index: 2;
  padding: 0 24px 100px;
}
.graphs-header { max-width: 1000px; margin: 0 auto 56px; }
.section-tag { font-size: 11px; font-weight: 700; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
.section-h { font-family: 'Syne', sans-serif; font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 800; letter-spacing: -1px; line-height: 1.1; }
.section-h em { font-style: normal; color: var(--gold2); }
.section-p { font-size: 1rem; color: var(--muted); margin-top: 12px; line-height: 1.7; font-weight: 300; }

.graphs-grid { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

.graph-card {
  background: var(--navy2);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 32px;
  position: relative; overflow: hidden;
  transition: all 0.3s;
}
.graph-card:hover { border-color: rgba(24,119,242,0.3); transform: translateY(-4px); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
.graph-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--blue), var(--blue2));
}
.graph-card.tiktok::before { background: linear-gradient(90deg, #ff0050, #ff6b9d); }

.graph-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.graph-platform { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--muted); }
.graph-platform-dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-fb { background: var(--blue); }
.dot-tt { background: #ff0050; }
.graph-change {
  font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 50px;
  background: rgba(74,222,128,0.12); color: #4ade80; border: 1px solid rgba(74,222,128,0.2);
}
.graph-value {
  font-family: 'Syne', sans-serif;
  font-size: 2.2rem; font-weight: 800;
  margin-bottom: 4px;
}
.graph-sublabel { font-size: 12px; color: var(--muted); margin-bottom: 24px; }

/* SVG Chart */
.chart-svg { width: 100%; height: 120px; }

.graph-footer { display: flex; gap: 16px; margin-top: 16px; }
.graph-foot-item { font-size: 11px; color: var(--muted); }
.graph-foot-item strong { color: white; font-size: 13px; display: block; }

/* ── FEATURES ── */
.features-section { position: relative; z-index: 2; padding: 0 24px 100px; }
.features-inner { max-width: 1000px; margin: 0 auto; }
.features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 56px; }
.feat {
  background: var(--navy2); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px 24px;
  transition: all 0.3s;
}
.feat:hover { border-color: rgba(201,168,76,0.25); transform: translateY(-3px); }
.feat-icon { font-size: 1.8rem; margin-bottom: 14px; }
.feat-title { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; margin-bottom: 8px; }
.feat-desc { font-size: 13px; color: var(--muted); line-height: 1.7; font-weight: 300; }

/* ── MODULES ── */
.modules-section { position: relative; z-index: 2; padding: 0 24px 100px; }
.modules-inner { max-width: 1000px; margin: 0 auto; }
.modules-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 56px; }
.mod {
  background: var(--navy2); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden; transition: all 0.3s;
}
.mod:hover { border-color: rgba(24,119,242,0.3); }
.mod-head {
  padding: 20px 24px; display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid var(--border);
  background: rgba(24,119,242,0.06);
}
.mod-num { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: rgba(255,255,255,0.1); }
.mod-title { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; }
.mod-body { padding: 20px 24px; }
.mod-item { display: flex; gap: 10px; font-size: 13px; color: var(--muted); padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04); line-height: 1.5; }
.mod-item:last-child { border-bottom: none; }
.mod-check { color: var(--gold2); flex-shrink: 0; }

/* ── PRICING ── */
.pricing-section { position: relative; z-index: 2; padding: 0 24px 100px; text-align: center; }
.pricing-inner { max-width: 1000px; margin: 0 auto; }
.pricing-card {
  max-width: 540px; margin: 56px auto 0;
  background: var(--navy2);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 24px; overflow: hidden;
  box-shadow: 0 40px 100px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.1);
  position: relative;
}
.pricing-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold2), var(--gold3), var(--gold2), var(--gold));
}
.pricing-top { padding: 44px 44px 32px; }
.pricing-label { font-size: 10px; letter-spacing: 3px; color: var(--gold); font-weight: 700; text-transform: uppercase; margin-bottom: 20px; }
.pricing-amount {
  font-family: 'Syne', sans-serif;
  font-size: 5rem; font-weight: 800; line-height: 1;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.pricing-cur { font-size: 1.8rem; vertical-align: top; margin-top: 16px; display: inline-block; }
.pricing-sub { font-size: 13px; color: var(--muted); }
.pricing-divider { height: 1px; background: var(--border); margin: 28px 0; }
.pricing-items { padding: 0 44px; text-align: left; }
.pricing-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; color: rgba(255,255,255,0.8); }
.pricing-item:last-child { border-bottom: none; }
.p-check { color: #4ade80; flex-shrink: 0; }
.p-bonus { color: var(--gold2); }
.pricing-bottom { padding: 28px 44px 44px; }
.pricing-btn {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  background: var(--green); color: white;
  font-size: 1rem; font-weight: 600;
  padding: 18px; border-radius: 14px;
  text-decoration: none; transition: all 0.3s;
  box-shadow: 0 8px 32px rgba(37,211,102,0.3);
  width: 100%;
}
.pricing-btn:hover { background: #1da851; transform: translateY(-2px); box-shadow: 0 16px 48px rgba(37,211,102,0.4); }
.pricing-note { font-size: 12px; color: var(--muted); margin-top: 14px; }

/* ── SOCIAL ── */
.social-section { position: relative; z-index: 2; padding: 0 24px 100px; }
.social-inner { max-width: 1000px; margin: 0 auto; }
.social-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 56px; }
.soc-card {
  border-radius: 16px; padding: 32px; text-align: center;
  text-decoration: none; display: block; transition: all 0.3s;
  border: 1px solid var(--border);
  background: var(--navy2);
  position: relative; overflow: hidden;
}
.soc-card::after {
  content: ''; position: absolute; inset: 0;
  opacity: 0; transition: opacity 0.3s;
}
.soc-fb::after { background: linear-gradient(135deg, rgba(24,119,242,0.15), transparent); }
.soc-tt::after { background: linear-gradient(135deg, rgba(255,0,80,0.15), transparent); }
.soc-wa::after { background: linear-gradient(135deg, rgba(37,211,102,0.15), transparent); }
.soc-card:hover { transform: translateY(-4px); }
.soc-card:hover::after { opacity: 1; }
.soc-card:hover.soc-fb { border-color: rgba(24,119,242,0.4); }
.soc-card:hover.soc-tt { border-color: rgba(255,0,80,0.4); }
.soc-card:hover.soc-wa { border-color: rgba(37,211,102,0.4); }
.soc-icon { font-size: 2.2rem; margin-bottom: 12px; position: relative; z-index: 1; }
.soc-name { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; color: white; margin-bottom: 5px; position: relative; z-index: 1; }
.soc-handle { font-size: 12px; color: var(--muted); position: relative; z-index: 1; }

/* ── CTA ── */
.final-cta {
  position: relative; z-index: 2;
  padding: 100px 24px; text-align: center;
  border-top: 1px solid var(--border);
  background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(24,119,242,0.1) 0%, transparent 70%);
}
.final-cta h2 { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 6vw, 4rem); font-weight: 800; letter-spacing: -2px; margin-bottom: 16px; }
.final-cta h2 em { font-style: normal; color: var(--gold2); }
.final-cta p { font-size: 1rem; color: var(--muted); max-width: 440px; margin: 0 auto 40px; line-height: 1.7; font-weight: 300; }
.final-btn {
  display: inline-flex; align-items: center; gap: 12px;
  background: var(--green); color: white;
  font-size: 1.05rem; font-weight: 600;
  padding: 18px 48px; border-radius: 50px;
  text-decoration: none; transition: all 0.3s;
  box-shadow: 0 12px 48px rgba(37,211,102,0.4);
}
.final-btn:hover { background: #1da851; transform: translateY(-3px); }

/* ── FOOTER ── */
footer {
  position: relative; z-index: 2;
  background: rgba(0,0,0,0.4);
  border-top: 1px solid var(--border);
  padding: 32px 24px; text-align: center;
}
.footer-logo { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; margin-bottom: 10px; }
.footer-logo span { color: var(--gold2); }
.footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
.footer-links a { font-size: 12px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
.footer-links a:hover { color: white; }
.footer-copy { font-size: 11px; color: rgba(255,255,255,0.2); }

/* ── FLOAT ── */
.float-wa {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--green); text-decoration: none;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 32px rgba(37,211,102,0.5);
  transition: transform 0.3s;
  animation: float-pulse 2.5s infinite;
}
.float-wa:hover { transform: scale(1.12); }

/* ── AI MODULE ── */
.ai-section { position: relative; z-index: 2; padding: 0 24px 100px; }
.ai-inner { max-width: 1000px; margin: 0 auto; }
.ai-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(59,130,246,0.1));
  border: 1px solid rgba(139,92,246,0.3);
  color: #a78bfa; font-size: 11px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 7px 16px; border-radius: 50px; margin-bottom: 14px;
}
.ai-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #a78bfa; animation: blink 1.5s infinite; }
.ai-section .section-h em { color: #a78bfa; }
.ai-hero-card {
  margin-top: 48px;
  background: linear-gradient(135deg, rgba(139,92,246,0.12), rgba(59,130,246,0.08));
  border: 1px solid rgba(139,92,246,0.25);
  border-radius: 24px; padding: 48px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center;
  position: relative; overflow: hidden;
}
.ai-hero-card::before {
  content: ''; position: absolute; top: -60px; right: -60px;
  width: 200px; height: 200px; border-radius: 50%;
  background: radial-gradient(circle, rgba(139,92,246,0.2) 0%, transparent 70%);
}
.ai-card-label { font-size: 11px; letter-spacing: 2px; color: #a78bfa; font-weight: 700; text-transform: uppercase; margin-bottom: 12px; }
.ai-card-title { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; line-height: 1.2; margin-bottom: 14px; }
.ai-card-title span { color: #a78bfa; }
.ai-card-desc { font-size: 14px; color: var(--muted); line-height: 1.7; font-weight: 300; }
.ai-tools { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
.ai-tool {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
  padding: 6px 14px; border-radius: 50px;
  font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 500;
}
.ai-screen {
  background: #0d1117; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.ai-screen-bar {
  background: #161b22; padding: 10px 16px;
  display: flex; align-items: center; gap: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.ai-dot { width: 10px; height: 10px; border-radius: 50%; }
.ai-screen-body { padding: 20px; }
.ai-prompt {
  background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.2);
  border-radius: 10px; padding: 12px 16px;
  font-size: 12px; color: #c4b5fd; margin-bottom: 12px; font-family: monospace;
}
.ai-prompt::before { content: '> '; color: #7c3aed; }
.ai-response { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.8; }
.ai-response-line { padding: 4px 0; display: flex; gap: 8px; }
.ai-response-line::before { content: '✨'; flex-shrink: 0; }

.ai-features-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 24px; }
.ai-feat {
  background: var(--navy2); border: 1px solid var(--border);
  border-radius: 14px; padding: 24px;
  transition: all 0.3s;
  position: relative; overflow: hidden;
}
.ai-feat:hover { border-color: rgba(139,92,246,0.3); transform: translateY(-3px); }
.ai-feat::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, #7c3aed, #a78b
